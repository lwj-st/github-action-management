# 测试 Secret 管理
name: Secret Test

on:
  workflow_dispatch:
    inputs:
      secret_key:
        description: '测试密钥（使用仓库 Secret，可选）'
        required: false
        type: string

jobs:
  test-secrets:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 测试 Secret 访问
        run: |
          echo "Secret 测试开始..."
          if [ -n "${{ secrets.TEST_SECRET_KEY }}" ]; then
            echo "✓ 成功访问 Secret"
            echo "密钥前缀：${{ secrets.TEST_SECRET_KEY:0:4 }}..."
          else
            echo "⚠️ Secret 未设置（正常情况）"
          fi
      
      - name: 测试 API Token
        run: |
          echo "GITHUB_TOKEN 存在：${{ github.token != '' }}"
          echo "运行 ID: ${{ github.run_id }}"
      
      - name: 输出 Secret 状态
        run: |
          echo "## Secret 测试报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 运行 ID: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- 状态：✅ 完成" >> $GITHUB_STEP_SUMMARY
      
      - name: 创建 Secret 测试文件
        run: |
          mkdir -p secret-test-results
          echo "Secret 测试完成" > secret-test-results/status.txt
          echo "时间：$(date)" >> secret-test-results/status.txt
          echo "运行 ID: ${{ github.run_id }}" >> secret-test-results/status.txt
      
      - name: 上传测试结果
        uses: actions/upload-artifact@v4
        with:
          name: secret-test-results
          path: secret-test-results/
      
      - name: 成功标记
        run: |
          echo "✅ Secret 测试通过"
